<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMO Control - Dashboard Corporativo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-slate-50/50 font-sans text-slate-800 antialiased selection:bg-blue-500 selection:text-white">

    <!-- Navbar -->
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 h-18 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 text-white p-2.5 rounded-xl shadow-md">
                    <i data-lucide="layers" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-900">PMO Control</h1>
                    <p class="text-xs text-slate-500 font-medium flex items-center gap-1">
                        <span class="inline-block w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                        Gestión de Requerimientos y Catálogos
                    </p>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="window.location.href='index_dashboard_ejecutivo.html'"
                    class="border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold text-sm px-4 py-2.5 rounded-xl flex items-center gap-2 transition cursor-pointer">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                    Dashboard
                </button>

                <button onclick="window.location.href='seguimiento_ejecutivo.html'"
                    class="border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold text-sm px-4 py-2.5 rounded-xl flex items-center gap-2 transition cursor-pointer">
                    <i data-lucide="route" class="w-4 h-4"></i>
                    Seguimiento
                </button>

                
                
                <button onclick="window.location.href='importar_matriz.html'"
                    class="border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold text-sm px-4 py-2.5 rounded-xl flex items-center gap-2 transition cursor-pointer">
                    <i data-lucide="file-up" class="w-4 h-4"></i>
                    Importar
                </button>

                <div class="hidden md:flex items-center gap-2 px-3 py-2 rounded-xl bg-slate-50 border border-slate-200">
                    <i data-lucide="user-check" class="w-4 h-4 text-emerald-600"></i>
                    <span id="usuario-sesion" class="text-xs font-bold text-slate-600 max-w-[180px] truncate">Usuario</span>
                </div>
                <button onclick="cerrarSesion()"
                    class="border border-rose-200 hover:bg-rose-50 text-rose-600 font-semibold text-sm px-4 py-2.5 rounded-xl flex items-center gap-2 transition cursor-pointer">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    Salir
                </button>
                <button onclick="abrirModalNuevo()"
                    class="group bg-slate-900 hover:bg-slate-800 text-white font-semibold text-sm px-4 py-2.5 rounded-xl shadow-lg flex items-center gap-2 transition-all cursor-pointer">
                    <i data-lucide="plus" class="w-4 h-4 transition-transform group-hover:rotate-90"></i>
                    Nuevo Requerimiento
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-8">
        <div id="pmo-panel-requerimientos"></div>
    </main>

    <div id="orbita-modales-requerimientos"></div>

    <script src="js/pmo-panel-html.js"></script>
    <script src="js/pmo-app.js"></script>
</body>

</html>
